<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>File Encryptor</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="background"></div>

<div class="container">

    <h1>FILE ENCRYPTOR</h1>

    <p class="subtitle">
        Encrypt & Decrypt File Securely
    </p>

    <select id="mode" onchange="toggleMode()">

        <option value="encrypt">
            Encrypt
        </option>

        <option value="decrypt">
            Decrypt
        </option>

    </select>

    <input type="file" id="fileInput">

    <div id="keySection" style="display:none;">

        <input type="file" id="keyInput">

    </div>

    <button onclick="processFile()">
        PROCESS
    </button>

    <div id="status"></div>

</div>

<script src="script.js"></script>

</body>
</html>
